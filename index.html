<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ドラムレッスン">
<meta name="theme-color" content="#f4f0e6">
<title>ドラムレッスン管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f4f0e6;
    --surface: #ffffff;
    --surface2: #ede8dc;
    --border: #d5ccbb;
    --accent: #4a6e38;
    --accent2: #b85e22;
    --text: #28200e;
    --text2: #5c5040;
    --text3: #8a7c6a;
    --green: #3d6e32;
    --yellow: #96720a;
    --red: #b03020;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  /* Layout */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Section */
  .section {
    margin-bottom: 32px;
  }
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* Class info */
  .class-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  /* Input */
  input, textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }
  input::placeholder, textarea::placeholder {
    color: #666;
  }
  select option { background: var(--surface2); }

  /* Student cards */
  .students-grid {
    display: grid;
    gap: 12px;
  }

  .student-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .student-card:focus-within {
    border-color: #3e3e3e;
  }

  .student-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    min-height: 56px;
  }
  .student-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    width: 20px;
    flex-shrink: 0;
  }
  .student-name-input {
    flex: 1;
    background: transparent;
    border: none;
    font-size: 15px;
    font-weight: 700;
    padding: 0;
    color: var(--text);
    min-width: 0;
  }
  .student-name-input:focus { border: none; box-shadow: none; }

  .student-phase {
    width: 110px;
    flex-shrink: 0;
    background: var(--surface);
    font-size: 13px;
    padding: 8px;
  }

  .toggle-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 22px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .toggle-btn:hover { color: var(--text); }

  .student-body {
    padding: 16px;
    display: none;
    border-top: 1px solid var(--border);
  }
  .student-body.open { display: block; }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  @media (max-width: 600px) {
    .fields-grid {
      grid-template-columns: 1fr;
    }
  }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  /* Slider */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slider-wrap input[type=range] {
    flex: 1;
    padding: 0;
    height: 6px;
    border: none;
    accent-color: var(--accent);
    background: var(--border);
    cursor: pointer;
  }
  .slider-val {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  /* API Key */
  .apikey-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 24px;
  }
  .apikey-row label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
  .apikey-row input {
    flex: 1;
    background: transparent;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 0;
  }

  /* Run button */
  .run-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .run-btn:hover { opacity: 0.9; }
  .run-btn:active { transform: scale(0.99); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Output */
  .output-area {
    display: none;
    margin-top: 32px;
  }
  .output-area.visible { display: block; }

  /* Score card */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .score-total {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 16px;
  }
  .score-badge {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }
  .score-badge.green { color: var(--green); }
  .score-badge.yellow { color: var(--yellow); }
  .score-badge.red { color: var(--red); }
  .score-label {
    font-size: 12px;
    color: var(--text2);
  }
  .score-judgment {
    font-size: 18px;
    margin-left: 4px;
  }

  .score-axes {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .axis-item {
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
  }
  .axis-label {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .axis-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  /* Common bar */
  .common-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .common-stage {
    display: flex;
    gap: 6px;
  }
  .stage-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    transition: all 0.2s;
  }
  .stage-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  /* Student result cards */
  .result-cards { display: grid; gap: 10px; margin-bottom: 16px; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .result-card-header {
    padding: 12px 16px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-name {
    font-weight: 700;
    font-size: 14px;
  }
  .homework-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .homework-yes { background: rgba(74,110,56,0.12); color: var(--accent); border: 1px solid rgba(74,110,56,0.3); }
  .homework-no { background: rgba(184,94,34,0.12); color: var(--accent2); border: 1px solid rgba(184,94,34,0.25); }

  .result-card-body {
    padding: 14px 16px;
    display: grid;
    gap: 10px;
  }
  .result-row { display: grid; gap: 4px; }
  .result-row-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  .result-row-val {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  /* Action box */
  .action-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 48px 0;
    color: var(--text2);
  }
  .loading.visible { display: block; }
  .loading-dots {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    letter-spacing: 0.3em;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .loading-text { margin-top: 12px; font-size: 12px; color: var(--text3); }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
  }
  .error-msg.visible { display: block; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Review cards */
  .review-class-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .review-class-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .review-class-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .review-class-meta {
    font-size: 11px;
    color: var(--text3);
  }
  .review-class-body {
    display: none;
    padding: 12px;
  }
  .review-class-body.open { display: block; }
  .review-student-row {
    background: var(--surface2);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .review-student-name {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .review-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .review-field { display: flex; flex-direction: column; gap: 2px; }
  .review-field-label {
    font-size: 10px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .review-field-val {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }
  .review-field-full {
    grid-column: 1 / -1;
  }
  .burden-pill {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal-sheet {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text3);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .modal-row {
    margin-bottom: 12px;
  }
  .modal-row-label {
    font-size: 10px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .modal-row-val {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }

  /* Class buttons */
  .class-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    width: 100%;
  }
  .class-btn:hover { border-color: var(--accent); color: var(--text); }
  .class-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  /* Day buttons */
  .day-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 24px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  /* Task cards */
  .task-class-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .task-class-header {
    background: var(--surface2);
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }
  .task-student-row {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: grid;
    gap: 4px;
  }
  .task-student-row:last-child { border-bottom: none; }
  .task-student-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .task-next {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }
  .task-song {
    font-size: 11px;
    color: var(--text3);
  }

  /* Override */
  .override-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 8px;
  }
  .override-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .override-label {
    font-size: 11px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .override-radio {
    display: flex;
    gap: 12px;
  }
  .override-radio label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  .override-radio input[type=radio] {
    width: auto;
    border: none;
    padding: 0;
    accent-color: var(--accent);
  }
  .override-memo {
    font-size: 13px;
    padding: 8px 10px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Drum Lesson</span>
  <span class="header-date" id="today-date"></span>
</div>

<div class="container">

  <!-- API Key -->
  <div class="apikey-row" id="apikey-row">
    <label>API KEY</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" oninput="localStorage.setItem('drumApiKey', this.value)">
    <button onclick="toggleApiKey()" id="apikey-toggle" style="background:none;border:none;color:var(--text3);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;white-space:nowrap;">隠す</button>
  </div>
  <div id="apikey-saved" style="display:none;font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:16px;cursor:pointer;" onclick="showApiKey()">
    🔑 APIキー設定済み <span style="color:var(--accent);text-decoration:underline;">変更</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('input')">入力・AI判断</button>
    <button class="tab-btn" onclick="switchTab('review')">次回の準備</button>
    <button class="tab-btn" onclick="switchTab('tasks')">今週の準備</button>
  </div>

  <!-- Tab: Input -->
  <div class="tab-content active" id="tab-input">

  <!-- Class info -->
  <div class="section">
    <div class="section-label">クラス情報</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
      <button class="day-btn active" id="input-day-fri" onclick="filterInputDay('金曜')">金曜</button>
      <button class="day-btn" id="input-day-sat" onclick="filterInputDay('土曜')">土曜</button>
      <input type="date" id="lesson-date" style="flex:1;margin-left:8px;" onchange="autoSelectDay(this.value)">
    </div>
    <div id="class-btn-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;"></div>
    <select id="class-select" onchange="loadPreset(this)" style="display:none;">
      <option value="">── クラスを選択 ──</option>
    </select>
    <div id="selected-class-display" style="display:none;font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);padding:6px 0;"></div>
  </div>

  <!-- Students -->
  <div class="section">
    <div class="section-label">生徒データ</div>
    <div class="students-grid" id="students-grid"></div>
  </div>

  <!-- Run -->
  <button class="run-btn" id="run-btn" onclick="runAI()">▶ AI判断を実行</button>
  <div class="error-msg" id="error-msg"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-dots">···</div>
    <div class="loading-text">Claude APIで処理中...</div>
  </div>

  <!-- Output -->

<script>
let CLASS_PRESETS = {};
let TRANSFER_DATA = []; // 振替予定データ
let LAST_SONGS = {}; // 各生徒の前回曲名

async function loadMasterData() {
  // キャッシュから即時表示
  const cached = localStorage.getItem('drumMasterCache');
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      if (parsed.classes) {
        CLASS_PRESETS = parsed.classes;
        populateClassSelectors();
      }
      if (parsed.transfers) TRANSFER_DATA = parsed.transfers;
      if (parsed.songs) LAST_SONGS = parsed.songs;
    } catch(e) {}
  }

  // バックグラウンドで最新データを取得・更新
  Promise.all([loadClassMaster(), loadTransferData(), loadLastSongs()]).then(() => {
    localStorage.setItem('drumMasterCache', JSON.stringify({
      classes: CLASS_PRESETS,
      transfers: TRANSFER_DATA,
      songs: LAST_SONGS,
      updated: Date.now()
    }));
  });
}

async function loadClassMaster() {
  return new Promise((resolve) => {
    const callbackName = 'masterCallback_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[callbackName];
      const s = document.getElementById('master-script');
      if (s) s.remove();
      resolve();
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      const s = document.getElementById('master-script');
      if (s) s.remove();
      if (data.status === 'ok') {
        CLASS_PRESETS = data.classes || {};
        populateClassSelectors();
      }
      resolve();
    };

    const script = document.createElement('script');
    script.id = 'master-script';
    script.src = GAS_URL + '?action=master&callback=' + callbackName;
    document.head.appendChild(script);
    script.onerror = () => { clearTimeout(timeout); resolve(); };
  });
}

async function loadTransferData() {
  return new Promise((resolve) => {
    const callbackName = 'transferCallback_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[callbackName];
      const s = document.getElementById('transfer-script');
      if (s) s.remove();
      resolve();
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      const s = document.getElementById('transfer-script');
      if (s) s.remove();
      if (data.status === 'ok') {
        TRANSFER_DATA = data.transfers || [];
      }
      resolve();
    };

    const script = document.createElement('script');
    script.id = 'transfer-script';
    script.src = GAS_URL + '?action=transfer&callback=' + callbackName;
    document.head.appendChild(script);
    script.onerror = () => { clearTimeout(timeout); resolve(); };
  });
}

async function loadLastSongs() {
  return new Promise((resolve) => {
    const callbackName = 'lastSongsCallback_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[callbackName];
      const s = document.getElementById('lastsongs-script');
      if (s) s.remove();
      resolve();
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      const s = document.getElementById('lastsongs-script');
      if (s) s.remove();
      if (data.status === 'ok') {
        LAST_SONGS = data.songs || {};
      }
      resolve();
    };

    const script = document.createElement('script');
    script.id = 'lastsongs-script';
    script.src = GAS_URL + '?action=last_songs&callback=' + callbackName;
    document.head.appendChild(script);
    script.onerror = () => { clearTimeout(timeout); resolve(); };
  });
}

let currentInputDay = localStorage.getItem('drumLastDay') || '金曜';

function autoSelectDay(dateStr) {
  if (!dateStr) return;
  const dow = new Date(dateStr).getDay(); // 0=日,1=月...5=金,6=土
  if (dow === 5) filterInputDay('金曜');
  else if (dow === 6) filterInputDay('土曜');
}

function filterInputDay(day) {
  currentInputDay = day;
  localStorage.setItem('drumLastDay', day);
  document.getElementById('input-day-fri').classList.toggle('active', day === '金曜');
  document.getElementById('input-day-sat').classList.toggle('active', day === '土曜');
  renderClassButtons(day);
}

function renderClassButtons(day) {
  const grid = document.getElementById('class-btn-grid');
  const classes = Object.keys(CLASS_PRESETS)
    .filter(c => c.startsWith(day))
    .sort();

  const lastClass = localStorage.getItem('drumLastClass');

  grid.innerHTML = classes.map(c => {
    const isSelected = c === lastClass;
    return `<button class="class-btn ${isSelected ? 'selected' : ''}"
      onclick="selectClassBtn('${c}')">${c.replace(day, '').trim()}</button>`;
  }).join('');

  // 前回選択クラスを自動ロード
  if (lastClass && classes.includes(lastClass)) {
    const fakeSelect = { value: lastClass };
    loadPreset(fakeSelect);
    showSelectedClass(lastClass);
  }
}

function selectClassBtn(className) {
  localStorage.setItem('drumLastClass', className);
  // ボタンのスタイル更新
  document.querySelectorAll('.class-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent.trim() === className.replace(currentInputDay, '').trim());
  });
  // hidden selectを更新してloadPreset呼び出し
  const sel = document.getElementById('class-select');
  sel.value = className;
  loadPreset(sel);
  showSelectedClass(className);
}

function showSelectedClass(className) {
  const display = document.getElementById('selected-class-display');
  display.textContent = '選択中：' + className;
  display.style.display = 'block';
}

function populateClassSelectors() {
  const classNames = Object.keys(CLASS_PRESETS).sort();

  // hidden select（loadPreset用）
  const sel = document.getElementById('class-select');
  sel.innerHTML = '<option value="">── クラスを選択 ──</option>';
  classNames.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });

  // 確認タブのクラス選択
  const reviewSel = document.getElementById('review-class-select');
  if (reviewSel) {
    reviewSel.innerHTML = '<option value="">── クラスを選択 ──</option>';
    classNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      reviewSel.appendChild(opt);
    });
  }

  // 入力タブの曜日ボタンと初期表示
  const savedDay = localStorage.getItem('drumLastDay') || '金曜';
  currentInputDay = savedDay;
  document.getElementById('input-day-fri').classList.toggle('active', savedDay === '金曜');
  document.getElementById('input-day-sat').classList.toggle('active', savedDay === '土曜');
  renderClassButtons(savedDay);
}

const SKILL_HINTS = [
  {label:'Pre：キッズプリント（どんどんたん等）', value:'Pre キッズプリント'},
  {label:'Ph.1：スティックの持ち方・基本フォーム', value:'Ph.1 フォーム'},
  {label:'Ph.1：各楽器の叩き方（スネア・バスドラ・ハイハット）', value:'Ph.1 楽器の叩き方'},
  {label:'Ph.2：きほんれんしゅう②（シンバルたいこ等）', value:'Ph.2 きほんれんしゅう②'},
  {label:'Ph.2：8ビート基礎（テンポ60）', value:'SK-204 8ビートtemp60'},
  {label:'Ph.2：8ビート基礎（テンポ80）', value:'SK-206 8ビートtemp80'},
  {label:'Ph.2：曲に合わせて8ビート', value:'SK-207 曲+8ビート'},
  {label:'Ph.3：8ビートバリエーション（バスドラパターン変化）', value:'Ph.3 バリエーション'},

  {label:'Ph.5：ハイハット オープン/クローズ', value:'Ph.5 HHオープン'},

  {label:'リズトレ（番号を入力）', value:'リズトレ No.'},
  {label:'曲練習のみ', value:'曲練習'},
];

const PHASES = ['体験','Pre','Ph.1','Ph.2','Ph.3','Ph.4','Ph.5','Ph.6','中級'];
const STUDENT_COUNT = 5;
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxmk_cJykap1VztRTAxnaEH5Wb7xF12TXK65nVE6bWtEB6EXsFisHGm2k1TKvnUTjzQ/exec';

function init() {
  // Load saved API key
  const savedKey = localStorage.getItem('drumApiKey');
  if (savedKey) {
    document.getElementById('api-key').value = savedKey;
    document.getElementById('apikey-row').style.display = 'none';
    document.getElementById('apikey-saved').style.display = 'block';
  }

  // Date
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('lesson-date').value = today.toISOString().split('T')[0];

  // Load master data from Google Sheets
  loadMasterData();

  // Build student cards
  const grid = document.getElementById('students-grid');
  for (let i = 1; i <= STUDENT_COUNT; i++) {
    const tmp = document.createElement('div');
    tmp.innerHTML = buildStudentCard(i);
    grid.appendChild(tmp.firstElementChild);
  }

  populateSkillSelects();

  // Slider events
  document.querySelectorAll('input[type=range]').forEach(s => {
    s.addEventListener('input', e => {
      const id = e.target.id.replace('_slider','_val');
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = e.target.value;
    });
  });
}

function fillSkill(selectEl, i) {
  if (!selectEl.value) return;
  document.getElementById(`s${i}_skill`).value = selectEl.value;
  selectEl.value = '';
}

function populateSkillSelects() {
  document.querySelectorAll('[onchange^="fillSkill"]').forEach(sel => {
    SKILL_HINTS.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h.value;
      opt.textContent = h.label;
      sel.appendChild(opt);
    });
  });
}

function loadPreset(selectEl) {
  const key = selectEl.value;
  if (!key) return;
  const students = CLASS_PRESETS[key];
  if (!students) return;
  // class name is driven by select

  // 全生徒スロットをリセット
  for (let i = 1; i <= STUDENT_COUNT; i++) {
    document.getElementById(`s${i}_name`).value = '';
    document.getElementById(`s${i}_phase`).value = 'Pre';
    const body = document.getElementById(`body-${i}`);
    const btn = document.getElementById(`toggle-${i}`);
    if (body) body.classList.remove('open');
    if (btn) btn.textContent = '＋';
  }

  // 今日の日付
  const todayStr = document.getElementById('lesson-date').value;

  // 体験生徒は当日のみ表示、お休み生徒は除外、通常生徒は常に表示
  const visibleStudents = students.filter(s => {
    if (s.absent) return false;
    if (s.phase !== '体験') return true;
    if (!s.lessonDate) return false;
    return s.lessonDate === todayStr;
  });

  // 振替生徒：当日・当クラスのみ追加
  const transferStudents = TRANSFER_DATA.filter(t =>
    t.date === todayStr && t.className === key
  ).map(t => ({
    name: t.name + '（振替）',
    phase: 'Ph.2' // デフォルト。入力後に変更可
  }));

  const allStudents = [...visibleStudents, ...transferStudents];

  allStudents.forEach((s, i) => {
    if (i >= STUDENT_COUNT) return;
    const idx = i + 1;
    document.getElementById(`s${idx}_name`).value = s.name;
    document.getElementById(`s${idx}_phase`).value = s.phase;

    // 前回の曲と週数を自動入力
    const songKey = key + '___' + s.name;
    const lastSong = LAST_SONGS[songKey];
    if (lastSong && lastSong.song) {
      document.getElementById(`s${idx}_song`).value = lastSong.song;
      document.getElementById(`s${idx}_song_weeks`).value = lastSong.weeks ? lastSong.weeks + '週目' : '';
    }
  });
}

function buildStudentCard(i) {
  const sliders = [
    {key:'mastery', label:'習熟度'},
    {key:'practice', label:'練習度'},
    {key:'motive', label:'モチベ'},
    {key:'autonomy', label:'自律度'},
    ];

  const sliderHTML = sliders.map(s => `
    <div class="field-group">
      <div class="field-label">${s.label}</div>
      <div class="slider-wrap">
        <input type="range" id="s${i}_${s.key}_slider" min="1" max="5" value="3">
        <span class="slider-val" id="s${i}_${s.key}_val">3</span>
      </div>
    </div>`).join('');

  const phaseOptions = PHASES.map(p =>
    `<option value="${p}">${p}</option>`).join('');

  return `
  <div class="student-card" id="card-${i}">
    <div class="student-header" onclick="toggleCard(${i})">
      <span class="student-num">${i}</span>
      <input class="student-name-input" type="text" id="s${i}_name"
        placeholder="生徒名" onclick="event.stopPropagation()">
      <select class="student-phase" id="s${i}_phase" onclick="event.stopPropagation()">
        ${phaseOptions}
      </select>
      <button class="toggle-btn" id="toggle-${i}">＋</button>
    </div>
    <div class="student-body" id="body-${i}">
      <div class="fields-grid">
        <div class="field-group" style="grid-column:1/-1;">
          <div class="field-label">今日やったスキル <span style="color:var(--text3);font-weight:400;">（下から選択 or 直接入力）</span></div>
          <select onchange="fillSkill(this, ${i})" style="margin-bottom:6px;font-size:12px;color:var(--text2);">
            <option value="">── スキルを選ぶ（注釈付き） ──</option>
          </select>
          <input type="text" id="s${i}_skill" placeholder="例：SK-204 8ビートtemp60 / 曲練習">
        </div>
        <div class="field-group" style="grid-column:1/-1;">
          <div class="field-label">今日やったセクション</div>
          <input type="text" id="s${i}_song_section" placeholder="例：Aメロ・サビ・通し・本日終わり">
        </div>
        <div style="grid-column:1/-1;display:flex;gap:12px;align-items:center;padding:4px 0;">
          <span style="font-size:11px;color:var(--text3);">曲：</span>
          <input type="text" id="s${i}_song" readonly
            style="flex:1;font-size:12px;color:var(--text3);background:transparent;border:none;padding:0;cursor:default;"
            placeholder="前回の曲が自動入力されます">
          <span style="font-size:11px;color:var(--text3);white-space:nowrap;">週数：</span>
          <input type="text" id="s${i}_song_weeks" readonly
            style="width:60px;font-size:12px;color:var(--text3);background:transparent;border:none;padding:0;cursor:default;"
            placeholder="自動">
        </div>

        ${sliderHTML}
        <div class="field-group" style="grid-column: 1/-1;">
          <div class="field-label">メモ</div>
          <input type="text" id="s${i}_memo" placeholder="任意">
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(i) {
  const body = document.getElementById(`body-${i}`);
  const btn = document.getElementById(`toggle-${i}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '＋' : '－';
}

function collectData() {
  const className = document.getElementById('class-select').value || '未設定クラス';
  const lessonDate = document.getElementById('lesson-date').value;

  const students = [];
  for (let i = 1; i <= STUDENT_COUNT; i++) {
    const name = document.getElementById(`s${i}_name`).value.trim();
    if (!name) continue;
    students.push({
      name,
      phase: document.getElementById(`s${i}_phase`).value,
      skill: document.getElementById(`s${i}_skill`).value || 'なし',
      mastery: document.getElementById(`s${i}_mastery_slider`).value,
      practice: document.getElementById(`s${i}_practice_slider`).value,
      motive: document.getElementById(`s${i}_motive_slider`).value,
      autonomy: document.getElementById(`s${i}_autonomy_slider`).value,
      song: document.getElementById(`s${i}_song`).value || 'なし',
      songSection: document.getElementById(`s${i}_song_section`).value || 'なし',
      songWeeks: document.getElementById(`s${i}_song_weeks`).value || '自動',
      memo: document.getElementById(`s${i}_memo`).value || 'なし',
    });
  }
  return { className, lessonDate, students };
}

function buildPrompt(data) {
  const studentLines = data.students.map((s, idx) => `
生徒${idx + 1}
- 名前：${s.name}
- 現在フェーズ：${s.phase}
- 今日やったスキル：${s.skill}
- 習熟度：${s.mastery} / 練習してきた度：${s.practice} / モチベーション：${s.motive} / 自律度：${s.autonomy}
- 今日やった曲：${s.song}
- 今日やったセクション：${s.songSection}
- 何週目：${s.songWeeks}
- メモ：${s.memo}`).join('\n');

  return `あなたはドラム講師のアシスタントです。以下のレッスン記録をもとに判断してください。

### 前提知識

フェーズ：Pre→Ph.1（フォーム）→Ph.2（8ビート基礎★最重要）→Ph.3（バリエーション）→Ph.4（フィルイン入門）→Ph.5（フィルイン発展/ハイハット）→Ph.6（特殊奏法）→中級

曲練習の指針：
- セクション情報から状態を推測する（「通し」なら全体練習、セクション名なら部分練習）
- 次曲候補がある場合は移行タイミングを判断する

曲の継続期間による変更提案：
- 集中力なし・モチベ低め（1〜2）：4週目あたりで曲変更を提案
- 標準（モチベ3）：8〜10週目で変更を提案
- 意欲が高い（モチベ4〜5）：16週以上継続もOK、本人が満足するまで

課題判断ルール：
- 練習度1〜2：課題なし（出しても意味がない）
- 練習度3以上×習熟度低：同じ内容をもう一週
- 練習度3以上×習熟度高：次ステップへ
- モチベ1〜2：楽しさ優先、難度を下げる
- 自律度4〜5：自主練の方向性を示す課題が有効
- 自律度1〜2：課題を出さない

グループ特性：1クラス5人・年齢もレベルもバラバラ。上手い子には1tips発展、遅れている子には復習案を。
メモに「次曲：〇〇」が含まれる場合は曲アドバイスに次曲への移行タイミングを含める。

### 入力データ

クラス名：${data.className}
レッスン日：${data.lessonDate}
${studentLines}

async function runAI() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { showError('APIキーを入力してください'); return; }

  const data = collectData();
  if (data.students.length === 0) { showError('生徒名を1人以上入力してください'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('output-area').classList.remove('visible');
  document.getElementById('error-msg').classList.remove('visible');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: buildPrompt(data) }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const json = await res.json();
    const text = json.content.map(b => b.text || '').join('');

    // JSONブロックを抽出してクリーニング
    let clean = text;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) clean = jsonMatch[0];
    clean = clean
      .replace(/```json|```/g, '')
      .replace(/,(\s*[}\]])/g, '$1')
      .trim();

    let result;
    try {
      result = JSON.parse(clean);
    } catch(parseErr) {
      // それでも失敗したらエラー詳細を表示
      throw new Error('AI出力のJSON解析に失敗しました。もう一度実行してください。');
    }
    renderOutput(result, data);
    // AI結果をグローバルに保持（保存ボタン押下時に使う）
    window._lastResult = result;
    window._lastData = data;

  } catch (e) {
    showError('エラー：' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('loading').classList.remove('visible');
  }
}

async function saveWithOverrides() {
  const result = window._lastResult;
  const data = window._lastData;
  if (!result || !data) {
    showSaveStatus('先にAI判断を実行してください', true);
    return;
  }

  // 上書きデータを収集
  result.students.forEach((s, idx) => {
    const overrideRadio = document.querySelector(`input[name="override_hw_${idx}"]:checked`);
    const overrideMemo = document.getElementById(`override_memo_${idx}`);
    if (overrideRadio && overrideRadio.value !== 'ai') {
      s.homework_override = overrideRadio.value === 'yes';
      s.homework_overridden = true;
    } else {
      s.homework_overridden = false;
    }
    if (overrideMemo && overrideMemo.value) {
      s.override_memo = overrideMemo.value;
    }
  });

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  await saveToSheet(data, result);
  btn.textContent = '✓ この内容でスプレッドシートに保存';
  btn.disabled = false;
}

    // GASはno-corsだとリダイレクトを追えないためフォーム送信方式で回避
    const form = new FormData();
    form.append('payload', payload);

async function loadReviewViaClaudeAPI(className) {
  // GASのread用エンドポイントをClaude API経由で呼ぶのではなく
  // スプレッドシートのデータをGASから直接JSONPで取得する方式に変更
  // scriptタグを使ったJSONP方式でCORSを回避
  const callbackName = 'gasCallback_' + Date.now();

  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      cleanup();
      document.getElementById('review-loading').style.display = 'none';
      document.getElementById('review-content').innerHTML =
        '<div style="color:var(--red);font-size:13px;padding:16px;">タイムアウトしました。もう一度試してください。</div>';
      reject(new Error('timeout'));
    }, 15000);

    window[callbackName] = function(data) {
      cleanup();
      if (data.status === 'error') {
        document.getElementById('review-content').innerHTML =
          '<div style="color:var(--red);font-size:13px;padding:16px;">エラー：' + data.message + '</div>';
      } else {
        renderReview(data.data, className);
      }
      document.getElementById('review-loading').style.display = 'none';
      resolve();
    };

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      const s = document.getElementById('jsonp-script');
      if (s) s.remove();
    }

    const script = document.createElement('script');
    script.id = 'jsonp-script';
    script.src = GAS_URL + '?action=read&class=' + encodeURIComponent(className) + '&callback=' + callbackName;
    document.head.appendChild(script);
    script.onerror = () => {
      cleanup();
      document.getElementById('review-loading').style.display = 'none';
      document.getElementById('review-content').innerHTML =
        '<div style="color:var(--red);font-size:13px;padding:16px;">読み込みに失敗しました。</div>';
      reject(new Error('script error'));
    };
  });
}

        const homework = row['課題上書き'] || row['課題'] || '';
        const hwBadge = homework === '出す'
          ? `<span style="font-size:10px;color:var(--accent);border:1px solid var(--accent);padding:1px 6px;border-radius:4px;font-family:'Space Mono',monospace;">課題あり</span>`
          : '';
        const nextLesson = row['次回教えること'] || '';
        const song = row['曲名'] || LAST_SONGS[className + '___' + s.name]?.song || '';
        const weeks = LAST_SONGS[className + '___' + s.name]?.weeks || '';
        const overrideMemo = row['上書きメモ'] || '';

        const absentBadge = s.absent
          ? `<span style="font-size:10px;color:var(--text3);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-family:'Space Mono',monospace;">今週休み</span>`
          : '';

        return `<div class="task-student-row" style="cursor:pointer;${s.absent ? 'opacity:0.45;' : ''}"
          onclick="openStudentModal('${s.name}', window._taskRows['${rowKey}'])">
          <div class="task-student-name">
            ${s.name} ${absentBadge} ${hwBadge}
            <span style="font-size:11px;color:var(--text3);margin-left:auto;">›</span>
          </div>
          ${!s.absent && nextLesson ? `<div class="task-next">${nextLesson}</div>` : ''}
          ${!s.absent && overrideMemo ? `<div class="task-next" style="color:var(--accent2);">📝 ${overrideMemo}</div>` : ''}
          ${!s.absent && song ? `<div class="task-song">🎵 ${song}${weeks ? ' ' + weeks + '週目' : ''}</div>` : ''}
        </div>`;
      }).join('');

    html += `<div class="task-class-card">
      <div class="task-class-header">${className}</div>
      ${badges}
      ${studentRows || '<div class="task-student-row"><div class="task-song">記録なし</div></div>'}
    </div>`;
  });

  document.getElementById('tasks-content').innerHTML = html;
}

function openStudentModal(name, row) {
  document.getElementById('modal-name').textContent = name;
  const homework = row['課題上書き'] || row['課題'] || '-';
  const hwColor = homework === '出す' ? 'var(--accent)' : 'var(--accent2)';

  const fields = [
    {label: '課題', val: homework, color: hwColor},
    {label: '次回教えること', val: row['次回教えること'] || '-'},
    {label: '説明ポイント', val: row['説明ポイント'] || '-'},
    {label: '発展 / 復習案', val: row['発展/復習案'] || '-'},
    {label: '曲アドバイス', val: row['曲アドバイス'] || '-'},
    {label: '上書きメモ', val: row['上書きメモ'] || '-'},
  ].filter(f => f.val && f.val !== '-' && f.val !== 'なし');

  document.getElementById('modal-body').innerHTML = fields.map(f => `
    <div class="modal-row">
      <div class="modal-row-label">${f.label}</div>
      <div class="modal-row-val" style="${f.color ? 'color:' + f.color : ''}">${f.val}</div>
    </div>`).join('') || '<div style="color:var(--text3);font-size:13px;">記録がまだありません</div>';

  document.getElementById('student-modal').classList.add('open');
}

function closeStudentModal() {
  document.getElementById('student-modal').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('student-modal')) closeStudentModal();
}

function buildBadges(className) {
  let html = '';

  // 振替バッジ
  const transfers = TRANSFER_DATA.filter(t => t.className === className);
  transfers.forEach(t => {
    const dateStr = t.date
      ? new Date(t.date).toLocaleDateString('ja-JP', {month:'long', day:'numeric', weekday:'short'})
      : '日程未定';
    html += `<div style="padding:8px 14px;background:rgba(74,110,56,0.08);border-bottom:1px solid var(--border);font-size:12px;color:var(--accent);">
      🔄 振替：${t.name}　${dateStr}　${t.originalClass ? t.originalClass + 'から' : ''}
    </div>`;
  });

  // 体験バッジ
  const trials = (CLASS_PRESETS[className] || []).filter(s => s.phase === '体験');
  trials.forEach(s => {
    const dateStr = s.lessonDate
      ? new Date(s.lessonDate).toLocaleDateString('ja-JP', {month:'long', day:'numeric', weekday:'short'})
      : '日程未定';
    html += `<div style="padding:8px 14px;background:rgba(184,94,34,0.08);border-bottom:1px solid var(--border);font-size:12px;color:var(--accent2);">
      🔔 体験：${s.name}　${dateStr}${s.note ? '　' + s.note : ''}　キッズプリント準備
    </div>`;
  });

  return html;
}

async function fetchClassData(className) {
  const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
  const cacheKey = 'drumTaskCache_' + className;

  // キャッシュ確認（1週間以内なら即返す）
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.ts < WEEK_MS) {
        // バックグラウンドで更新
        fetchClassDataFromGAS(className).then(rows => {
          if (rows.length > 0) {
            localStorage.setItem(cacheKey, JSON.stringify({data: rows, ts: Date.now()}));
          }
        });
        return parsed.data;
      }
    }
  } catch(e) {}

  // キャッシュなし → GASから取得
  const rows = await fetchClassDataFromGAS(className);
  if (rows.length > 0) {
    try {
      localStorage.setItem(cacheKey, JSON.stringify({data: rows, ts: Date.now()}));
    } catch(e) {}
  }
  return rows;
}

async function fetchClassDataFromGAS(className) {
  return new Promise((resolve) => {
    const callbackName = 'classCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const scriptId = 'class-script-' + callbackName;
    const timeout = setTimeout(() => {
      delete window[callbackName];
      const s = document.getElementById(scriptId);
      if (s) s.remove();
      resolve([]);
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      const s = document.getElementById(scriptId);
      if (s) s.remove();
      resolve(data.status === 'ok' ? data.data : []);
    };

    const script = document.createElement('script');
    script.id = scriptId;
    script.src = GAS_URL + '?action=read&class=' + encodeURIComponent(className) + '&callback=' + callbackName;
    document.head.appendChild(script);
    script.onerror = () => { clearTimeout(timeout); resolve([]); };
  });
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

init();
</script>
